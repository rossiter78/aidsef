# AIDSEF fix iteration (playbook section 2.5): mention @claude on any
# PR or issue comment and Claude acts on the feedback - the review ->
# fix loop's engine, running on the subscription OAuth token.
name: claude-fix

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  claude-fix:
    name: claude-fix
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Act on the @claude mention
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Read constitution.md before acting. You are working inside AIDSEF's governed
            loop: role separation applies (fixes to implementation stay in src/**; do not
            edit tests to make them pass - if a test is wrong, say so and stop), the red
            proof and CI must stay green, and confirmed correctness/security findings are
            never negotiable (constitution section 7.2). Address the comment that
            mentioned you, on the PR's own branch.
